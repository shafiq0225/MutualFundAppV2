<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">MF</div>
      <div class="brand-text">
        <span class="brand-name">MutualFundNav</span>
        <span class="brand-env">Monitor</span>
      </div>
    </div>

    <nav class="nav">
      <button
        *ngFor="let tab of tabs"
        class="nav-item"
        [class.active]="activeTab === tab.id"
        (click)="setTab(tab.id)">
        <span class="nav-icon">{{ tab.icon }}</span>
        <span class="nav-label">{{ tab.label }}</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="footer-line">AMFI NAV Service</div>
      <div class="footer-line">v1.0.0 · .NET 8</div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <div class="page-header">
      <h1>{{ tabs | tabLabel:activeTab }}</h1>
      <div class="api-badge">
        <span class="dot live"></span>API
      </div>
    </div>

    <div class="content">
      <app-dashboard      *ngIf="activeTab === 'dashboard'"></app-dashboard>
      <app-nav-history    *ngIf="activeTab === 'nav-history'"></app-nav-history>
      <app-job-logs       *ngIf="activeTab === 'job-logs'"></app-job-logs>
      <app-market-holidays *ngIf="activeTab === 'holidays'"></app-market-holidays>
      <app-kafka-events   *ngIf="activeTab === 'kafka'"></app-kafka-events>
    </div>
  </main>

</div>

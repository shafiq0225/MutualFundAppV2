<div class="topbar" *ngIf="!isUnauthorizedPage()">
  <span class="brand display"><i class="fas fa-book"></i> Investment Passbook</span>
  <nav>
    <a routerLink="/orders" routerLinkActive="active"><i class="fas fa-receipt"></i> Orders</a>
    <a routerLink="/investor" routerLinkActive="active"><i class="fas fa-wallet"></i> Investor</a>
  </nav>
  <div class="user-area" *ngIf="currentUser() as user">
    <span class="user-name">{{ user.firstName }} {{ user.lastName }}</span>
  </div>
</div>

<router-outlet></router-outlet>

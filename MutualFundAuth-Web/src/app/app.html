<div class="standalone-topbar">
  <span class="brand display">User & Family Management</span>
  <nav class="standalone-nav">
    <a routerLink="/users" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">All Users</a>
    <a routerLink="/users/pending" routerLinkActive="active">Pending Approvals</a>
    <a routerLink="/family" routerLinkActive="active">Family Groups</a>
    <div class="nav-divider"></div>
    <a routerLink="/login" routerLinkActive="active" *ngIf="!(isAuthenticated$ | async)">Login</a>
    <a routerLink="/register" routerLinkActive="active" *ngIf="!(isAuthenticated$ | async)">Register</a>
    <a (click)="logout()" *ngIf="isAuthenticated$ | async" class="logout-link">Logout</a>
  </nav>
</div>

<router-outlet></router-outlet>

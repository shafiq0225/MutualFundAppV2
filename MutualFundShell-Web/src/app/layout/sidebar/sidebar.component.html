<aside class="sidebar" [class.collapsed]="layout.sidebarCollapsed()">
  <div class="brand">
    <i class="fas fa-building-columns"></i>
    @if (!layout.sidebarCollapsed()) {
      <span class="brand-text">MutualFund<em>Passbook</em></span>
    }
  </div>

  <nav class="nav-list">
    @for (item of navItems; track item.route) {
      <a
        class="nav-item"
        [routerLink]="item.route"
        routerLinkActive="active"
        [title]="layout.sidebarCollapsed() ? item.label : ''"
      >
        <i class="fas" [ngClass]="item.icon"></i>
        @if (!layout.sidebarCollapsed()) {
          <span class="label">{{ item.label }}</span>
          @if (item.soon) {
            <span class="badge">Soon</span>
          }
        }
      </a>
    }
  </nav>

  <button
    class="collapse-toggle"
    type="button"
    (click)="layout.toggleSidebar()"
    [title]="layout.sidebarCollapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
  >
    <i class="fas" [ngClass]="layout.sidebarCollapsed() ? 'fa-angles-right' : 'fa-angles-left'"></i>
  </button>
</aside>
